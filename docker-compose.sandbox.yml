version: '3.8'

services:
  # The Core API Sandbox
  jules-api-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jules-api-core-sandbox
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    networks:
      - jules-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Webapp Sandbox 1 (Primary Frontend/Integration)
  webapp-sandbox-1:
    build:
      context: .
      dockerfile: Dockerfile.cloud.fixed
    container_name: webapp-sandbox-primary
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - JULES_API_URL=http://jules-api-core:8000
      - SANDBOX_ID=webapp-sandbox-1
    networks:
      - jules-network
    depends_on:
      - jules-api-core
    restart: always

  # Webapp Sandbox 2 (Secondary/Analytics)
  webapp-sandbox-2:
    build:
      context: .
      dockerfile: Dockerfile.cloud.fixed
    container_name: webapp-sandbox-analytics
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - JULES_API_URL=http://jules-api-core:8000
      - SANDBOX_ID=webapp-sandbox-2
    networks:
      - jules-network
    depends_on:
      - jules-api-core
    restart: always

  # MQL5 Forge & Git Sync Node
  mql5-forge:
    image: alpine:latest
    container_name: mql5-forge-sandbox
    command: sh -c "apk add --no-cache git && while true; do sleep 3600; done"
    environment:
      - MQL5_REPO_URL=https://forge.mql5.io/LengKundee/mql5.git
      - JULES_API_URL=http://jules-api-core:8000
    volumes:
      - ./expert-advisors:/mql5-workspace
    networks:
      - jules-network
    restart: always

  # System Monitor & Keep-Alive Node (Networking Operation)
  jules-sys-monitor:
    image: alpine:latest
    container_name: jules-networking-monitor
    command: sh -c "apk add --no-cache curl && while true; do echo 'Pinging JULES API Core...'; curl -s http://jules-api-core:8000/ || echo 'API unreachable'; sleep 60; done"
    networks:
      - jules-network
    depends_on:
      - jules-api-core
    restart: always

networks:
  jules-network:
    name: jules-intelligent-community-net
    driver: bridge

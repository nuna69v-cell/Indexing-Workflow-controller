name: CI Workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install "numpy<2.0.0"; pip install -r requirements.txt; fi
          TA_INCLUDE_PATH=/usr TA_LIBRARY_PATH=/usr/lib LDFLAGS="-L/usr/lib" pip install ruff pytest pytest-cov

      - name: Lint with Ruff
        run: |
          ruff check src/ tests/

      - name: Run Tests with Coverage
        run: |
          PYTHONPATH=. pytest --cov=src/ tests/ --cov-report=xml

      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

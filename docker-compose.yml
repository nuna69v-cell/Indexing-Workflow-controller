services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
    - .env
    ports:
    - 8000:8000
    volumes:
    - .:/app
  discord_bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/discord_bot.py
    env_file:
    - .env
    volumes:
    - .:/app
  gui_terminal:
    build:
      context: .
      dockerfile: Dockerfile
    command: ./start_gui_terminal.sh
    env_file:
    - .env
    ports:
    - 127.0.0.1:7681:7681
    volumes:
    - .:/app
  notifier:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/notifier.py
    env_file:
    - .env
    volumes:
    - .:/app
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/scheduler.py
    env_file:
    - .env
    volumes:
    - .:/app
  telegram_bot:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/telegram_bot.py
    env_file:
    - .env
    volumes:
    - .:/app
  websocket_feed:
    build:
      context: .
      dockerfile: Dockerfile
    command: python services/websocket_feed.py
    env_file:
    - .env
    volumes:
    - .:/app
version: '3.8'

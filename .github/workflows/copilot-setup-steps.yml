name: Copilot Setup Steps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  setup-copilot:
    runs-on: ubuntu-latest
    environment: copilot

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ secrets.COPILOT_PYTHON_VERSION || '3.13' }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libopenblas-dev
          if [ -f ta-lib/ta-lib_0.6.4_amd64.deb ]; then
            sudo dpkg -i ta-lib/ta-lib_0.6.4_amd64.deb || sudo apt-get install -f -y
            sudo ln -s /usr/lib/libta-lib.so /usr/lib/libta_lib.so || true
          fi

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          TA_INCLUDE_PATH=/usr/include TA_LIBRARY_PATH=/usr/lib LDFLAGS="-L/usr/lib" pip install TA-Lib
